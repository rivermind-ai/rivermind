target-version = "py311"
line-length = 100
src = ["src", "tests"]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific
    "TCH",  # flake8-type-checking
    "PTH",  # flake8-use-pathlib
    "PL",   # pylint
    "A",    # flake8-builtins
    "ANN",  # flake8-annotations
    "ASYNC",# flake8-async
    "S",    # flake8-bandit
]
ignore = [
    "ANN401",   # allow Any in rare cases
    "PLR0913",  # function with many args — fine for config/builders
    "S101",     # asserts are fine in tests
]

[lint.per-file-ignores]
"tests/**" = ["ANN", "S", "PLR2004"]

[lint.isort]
known-first-party = ["rivermind"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"

name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check tag version matches pyproject.toml
        id: version
        run: |
          python -m pip install --upgrade pip packaging tomli
          python - <<'PY'
          import os, re, tomli
          from packaging.version import Version, InvalidVersion

          tag = os.environ["GITHUB_REF_NAME"]
          if not tag.startswith("v"):
              raise SystemExit(f"tag {tag!r} does not start with 'v'")
          tag_version_str = tag[1:]

          with open("pyproject.toml", "rb") as f:
              project_version_str = tomli.load(f)["project"]["version"]

          try:
              tag_version = Version(tag_version_str)
              project_version = Version(project_version_str)
          except InvalidVersion as exc:
              raise SystemExit(f"invalid PEP 440 version: {exc}")

          if tag_version != project_version:
              raise SystemExit(
                  f"tag version {tag_version} does not match "
                  f"pyproject.toml version {project_version}"
              )

          normalized = str(project_version)
          is_prerelease = "true" if tag_version.is_prerelease else "false"
          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"version={normalized}\n")
              out.write(f"is_prerelease={is_prerelease}\n")
          print(f"ok: {tag} -> {normalized} (prerelease={is_prerelease})")
          PY

      - name: Build distributions
        run: |
          python -m pip install build
          python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke-testpypi:
    name: Install from TestPyPI and smoke-test
    needs: [build, publish-testpypi]
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download rivermind wheel from TestPyPI (retry for cache lag)
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          python -m venv /tmp/smoke
          mkdir -p /tmp/wheels
          for attempt in 1 2 3 4 5; do
            if /tmp/smoke/bin/pip download \
                --index-url https://test.pypi.org/simple/ \
                --no-deps \
                --dest /tmp/wheels \
                "rivermind==${VERSION}"; then
              exit 0
            fi
            echo "download attempt ${attempt} failed; sleeping 10s"
            sleep 10
          done
          echo "could not download rivermind==${VERSION} from TestPyPI after 5 attempts"
          exit 1

      - name: Install the wheel, resolving deps from PyPI
        run: /tmp/smoke/bin/pip install /tmp/wheels/*.whl

      - name: Smoke the installed console script
        run: /tmp/smoke/bin/rivermind --help

  publish-pypi:
    name: Publish to PyPI
    needs: [build, smoke-testpypi]
    if: needs.build.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: [build, publish-pypi]
    if: needs.build.outputs.is_prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag \
            dist/*
